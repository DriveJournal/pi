name: MQTT Source
language: python
variables:
  - name: output
    inputType: OutputTopic
    description: Name of the output topic to publish to.
    defaultValue: rawtelemetry
    required: true
  - name: mqtt_topic
    inputType: FreeText
    description: The root for messages in MQTT, this can be anything
    defaultValue: telemetry
    required: true
  - name: mqtt_server
    inputType: FreeText
    description: The address of your MQTT server
    defaultValue: 35f4b0b909cd46cdb69a5c7a134a2657.s1.eu.hivemq.cloud
    required: true
  - name: mqtt_port
    inputType: FreeText
    description: The port of your MQTT instance
    defaultValue: 8883
    required: true
  - name: mqtt_username
    inputType: FreeText
    description: Your MQTT username
    defaultValue: brianm
    required: true
  - name: mqtt_password
    inputType: HiddenText
    description: Your MQTT password
    defaultValue: 1103Mano2477$
    required: true
  - name: mqtt_version
    inputType: FreeText
    description: 'MQTT protocol version: 3.1, 3.1.1, 5'
    defaultValue: 3.1.1
    required: true
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: mqtt_function.py
